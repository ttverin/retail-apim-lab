name: Deploy Node.js Azure Function

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Clean install
        run: |
          cd apis/product-api
          rm -rf node_modules
          npm install --production

      - name: Zip function app
        run: |
          cd apis/product-api
          zip -r ../../function.zip .

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: func-product-pj8x7
          package: function.zip